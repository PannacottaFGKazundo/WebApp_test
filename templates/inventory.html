{% extends "base.html" %}
{% block body_attrs %}data-page="inventory"{% endblock %}
{% block title %}在庫管理 - 家庭管理{% endblock %}
{% block content %}
<h4 class="fw-bold mb-3"><i class="bi bi-box-seam text-info"></i> 在庫管理</h4>

<!-- Add Item Form -->
<div class="card shadow-sm mb-3">
    <div class="card-header py-2 fw-bold" data-bs-toggle="collapse" data-bs-target="#addItemForm" style="cursor:pointer">
        <i class="bi bi-plus-circle text-primary"></i> 新しい食材を追加
        <i class="bi bi-chevron-down float-end"></i>
    </div>
    <div class="collapse" id="addItemForm">
        <div class="card-body">
            <form id="add-inventory-form" novalidate>
                <div class="row g-2">
                    <div class="col-12">
                        <input type="text" name="name" class="form-control" placeholder="食材名（例：卵）" required>
                    </div>
                    <div class="col-5">
                        <input type="number" name="quantity" class="form-control" placeholder="数量" min="0" step="0.1" required>
                    </div>
                    <div class="col-3">
                        <input type="text" name="unit" class="form-control" placeholder="単位" value="個">
                    </div>
                    <div class="col-4">
                        <input type="text" name="category" class="form-control" placeholder="カテゴリ" list="categoryList">
                        <datalist id="categoryList">
                            {% for cat in categories %}
                            <option value="{{ cat }}">
                            {% endfor %}
                            <option value="野菜">
                            <option value="肉・魚">
                            <option value="乳製品">
                            <option value="調味料">
                            <option value="飲み物">
                            <option value="その他">
                        </datalist>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-plus"></i> 追加する
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Category Filter -->
<div id="category-filter" class="mb-3 d-flex flex-wrap gap-1"></div>

<!-- Inventory List -->
<div id="inventory-list"></div>
{% endblock %}
