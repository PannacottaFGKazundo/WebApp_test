{% extends "base.html" %}
{% block body_attrs %}data-page="menu"{% endblock %}
{% block title %}夕食メニュー - 家庭管理{% endblock %}
{% block content %}
<h4 class="fw-bold mb-3"><i class="bi bi-egg-fried text-warning"></i> 夕食メニュー</h4>

<!-- Add Menu Form -->
<div class="card shadow-sm mb-3">
    <div class="card-header py-2 fw-bold" data-bs-toggle="collapse" data-bs-target="#addMenuForm" style="cursor:pointer">
        <i class="bi bi-plus-circle text-primary"></i> 新しいメニューを登録
        <i class="bi bi-chevron-down float-end"></i>
    </div>
    <div class="collapse" id="addMenuForm">
        <div class="card-body">
            <form id="add-menu-form" novalidate>
                <div class="mb-2">
                    <label class="form-label small fw-bold">メニュー名 <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" placeholder="例：肉じゃが" required>
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-bold">説明</label>
                    <input type="text" name="description" class="form-control" placeholder="一言説明（任意）">
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-bold">調理手順</label>
                    <textarea name="instructions" class="form-control" rows="3"
                              placeholder="調理手順を入力（任意）"></textarea>
                </div>

                <!-- Ingredients -->
                <div class="mb-2">
                    <label class="form-label small fw-bold">材料</label>
                    <div id="ingredientList">
                        <div class="ingredient-row row g-1 mb-1">
                            <div class="col-5">
                                <input type="text" name="ingredient_name[]" class="form-control form-control-sm" placeholder="食材名">
                            </div>
                            <div class="col-3">
                                <input type="number" name="ingredient_quantity[]" class="form-control form-control-sm" placeholder="量" min="0" step="0.1">
                            </div>
                            <div class="col-3">
                                <input type="text" name="ingredient_unit[]" class="form-control form-control-sm" placeholder="単位">
                            </div>
                            <div class="col-1 d-flex align-items-center">
                                <button type="button" class="btn btn-sm btn-outline-danger remove-ingredient px-1">
                                    <i class="bi bi-x"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <button type="button" id="addIngredient" class="btn btn-sm btn-outline-secondary mt-1">
                        <i class="bi bi-plus"></i> 材料を追加
                    </button>
                </div>

                <button type="submit" class="btn btn-warning w-100 mt-2">
                    <i class="bi bi-save"></i> メニューを登録
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Menu List -->
<div id="menu-list"></div>

<!-- Recipe Modal -->
<div class="modal fade" id="recipeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="recipeModalTitle">レシピ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="recipeModalBody">
                <div class="text-center py-3">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Dynamic ingredient rows – add/remove handled here;
// form submit and recipe modal are handled by app.js.
document.getElementById('addIngredient').addEventListener('click', function() {
    const row = document.createElement('div');
    row.className = 'ingredient-row row g-1 mb-1';
    row.innerHTML = `
        <div class="col-5">
            <input type="text" name="ingredient_name[]" class="form-control form-control-sm" placeholder="食材名">
        </div>
        <div class="col-3">
            <input type="number" name="ingredient_quantity[]" class="form-control form-control-sm" placeholder="量" min="0" step="0.1">
        </div>
        <div class="col-3">
            <input type="text" name="ingredient_unit[]" class="form-control form-control-sm" placeholder="単位">
        </div>
        <div class="col-1 d-flex align-items-center">
            <button type="button" class="btn btn-sm btn-outline-danger remove-ingredient px-1">
                <i class="bi bi-x"></i>
            </button>
        </div>`;
    document.getElementById('ingredientList').appendChild(row);
});

document.getElementById('ingredientList').addEventListener('click', function(e) {
    if (e.target.closest('.remove-ingredient')) {
        const rows = document.querySelectorAll('#ingredientList .ingredient-row');
        if (rows.length > 1) {
            e.target.closest('.ingredient-row').remove();
        }
    }
});
</script>
{% endblock %}
